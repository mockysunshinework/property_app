services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: property_app_development
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    command: bash -lc "bin/rails db:prepare && bin/rails s -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/property_app_development
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/rails

volumes:
  pgdata:
